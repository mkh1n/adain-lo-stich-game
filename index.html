<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameBoy пиксель-арт: Центральный квадрат</title>
    <style>
        /* === ПИКСЕЛЬ-АРТ СТИЛЬ === */
        * {
            box-sizing: border-box;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: optimize-contrast;
            -ms-interpolation-mode: nearest-neighbor;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16"><rect width="16" height="16" fill="none" /><circle cx="8" cy="8" r="6" fill="white" stroke="black" stroke-width="2" /></svg>') 8 8, auto;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background: #2d1b0e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
        }

        .gameboy-frame {
            background: #9bbc0f;
            padding: 24px 24px 32px 24px;
            border-radius: 20px 20px 30px 30px;
            box-shadow: inset -4px -4px 0 #6b8c0c, inset 4px 4px 0 #c4e01e, 0 10px 0 #3f2e1b;
            border: 2px solid #0f380f;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Верхний ряд аватаров */
        .avatars-row {
            display: flex;
            justify-content: space-between;
            width: 900px;
            margin-bottom: 8px;
        }

        /* Нижний ряд аватаров */
        .avatars-row-bottom {
            display: flex;
            justify-content: space-between;
            width: 900px;
            margin-top: 8px;
        }

        /* Отдельный аватар с рамкой */
        .avatar-frame {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #3a5f3a;
            border: 4px solid #1e3a1e;
            box-shadow: inset -2px -2px 0 #0f280f, inset 2px 2px 0 #6b8c6b;
            padding: 8px;
            width: 180px;
            image-rendering: pixelated;
        }

        /* Квадрат под фото */
        .avatar-square {
            width: 48px;
            height: 48px;
            border: 4px solid #1e3a1e;
            background: #6b8c6b;
            box-shadow: inset -2px -2px 0 #2f4a2f, inset 2px 2px 0 #8bb08b;
            image-rendering: pixelated;
        }

        /* Цветные рамки для аватаров */
        .avatar-blue .avatar-square { background: #4a7db5; background-image: repeating-linear-gradient(45deg, #2a4d8a 0px, #2a4d8a 4px, #6a9fd0 4px, #6a9fd0 8px); }
        .avatar-yellow .avatar-square { background: #e3c14e; background-image: repeating-linear-gradient(45deg, #b38b2a 0px, #b38b2a 4px, #f5e17a 4px, #f5e17a 8px); }
        .avatar-pink .avatar-square { background: #d96c9e; background-image: repeating-linear-gradient(45deg, #a13e6f 0px, #a13e6f 4px, #f7a8c4 4px, #f7a8c4 8px); }
        .avatar-red .avatar-square { background: #c44b4b; background-image: repeating-linear-gradient(45deg, #8b2a2a 0px, #8b2a2a 4px, #e68080 4px, #e68080 8px); }

        /* Статус бар */
        .status-bar-container {
            flex: 1;
            height: 20px;
            background: #1e3a1e;
            border: 3px solid #0f280f;
            box-shadow: inset 1px 1px 0 #0b1b0b;
            position: relative;
        }

        .status-fill {
            height: 100%;
            width: 0%;
            transition: width 0.1s;
            box-shadow: inset -1px -1px 0 #2d6b2d, inset 1px 1px 0 #8fd08f;
        }

        /* Игровой экран */
        .game-screen {
            position: relative;
            width: 900px;
            height: 500px;
            background: #9a9e76;
            border: 6px solid #0f380f;
            border-radius: 12px;
            box-shadow: inset 0 0 0 2px #6b8c0c;
            overflow: hidden;
            margin: 0 auto;
        }

        /* Карта */
        .map-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(45deg, #7c9f4f 2px, transparent 2px),
                linear-gradient(-45deg, #6d8f42 2px, transparent 2px);
            background-size: 16px 16px;
            background-color: #8bb15a;
            border: 1px solid #3f6140;
            box-shadow: inset 0 0 0 4px rgba(15, 56, 15, 0.3);
            z-index: 1;
        }

        /* Центральный квадрат 2x2 (визуальная подсказка) */
        .center-square {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100px;
            height: 100px;
            transform: translate(-50%, -50%);
            border: 3px dashed #f0e68c;
            background: rgba(255, 255, 160, 0.1);
            z-index: 10;
            pointer-events: none;
        }

        /* Индивидуальные финишные точки (невидимые, для отладки можно сделать видимыми) */
        .finish-point {
            position: absolute;
            width: 10px;
            height: 10px;
            background: transparent; /* сделайте red чтобы увидеть точки */
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 15;
            pointer-events: none;
        }

        /* Персонажи */
        .character {
            position: absolute;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 4px solid #1a2b1a;
            box-shadow: 0 4px 0 #0f1f0f, inset -2px -2px 0 rgba(0,0,0,0.5);
            transform: translate(-50%, -50%);
            z-index: 100;
            cursor: grab;
            background-size: cover;
            background-position: center;
        }

        .character:active {
            cursor: grabbing;
            filter: brightness(1.1);
            box-shadow: 0 2px 0 #0f1f0f, inset -2px -2px 0 rgba(0,0,0,0.5);
            transform: translate(-50%, -48%);
        }

        /* Цвета персонажей */
        .char-blue { background: #4a7db5; background: radial-gradient(circle at 30% 30%, #7aa5d9, #1f4a8a); }
        .char-yellow { background: #e3c14e; background: radial-gradient(circle at 30% 30%, #f5e17a, #b38b2a); }
        .char-pink { background: #d96c9e; background: radial-gradient(circle at 30% 30%, #f7a8c4, #a13e6f); }
        .char-red { background: #c44b4b; background: radial-gradient(circle at 30% 30%, #e68080, #8b2a2a); }

        .connection-status {
            background: #1e3a1e;
            color: #9bbc0f;
            padding: 4px 12px;
            border: 2px solid #0f380f;
            font-size: 14px;
            margin-top: 12px;
            display: inline-block;
        }

        .instruction {
            text-align: center;
            margin-top: 12px;
            color: #0f380f;
            font-size: 14px;
            text-shadow: 2px 2px 0 #6b8c0c;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="gameboy-frame">
        <div class="game-container">
            <!-- Верхний ряд аватаров -->
            <div class="avatars-row">
                <div class="avatar-frame avatar-blue">
                    <div class="avatar-square" id="avatar0"></div>
                    <div class="status-bar-container">
                        <div class="status-fill" id="bar0" style="width: 0%; background: #4a7db5;"></div>
                    </div>
                </div>
                <div class="avatar-frame avatar-yellow">
                    <div class="avatar-square" id="avatar1"></div>
                    <div class="status-bar-container">
                        <div class="status-fill" id="bar1" style="width: 0%; background: #e3c14e;"></div>
                    </div>
                </div>
            </div>

            <!-- Игровое поле -->
            <div class="game-screen" id="gameScreen">
                <div class="map-background" id="mapImage"></div>
                
                <!-- Визуальный центральный квадрат -->
                <div class="center-square"></div>
                
                <!-- Индивидуальные финишные точки (скрыты) -->
                <div class="finish-point" id="finish0" style="top: 50%; left: 50%;"></div>
                <div class="finish-point" id="finish1" style="top: 50%; left: 50%;"></div>
                <div class="finish-point" id="finish2" style="top: 50%; left: 50%;"></div>
                <div class="finish-point" id="finish3" style="top: 50%; left: 50%;"></div>

                <!-- Персонажи -->
                <div class="character char-blue" id="char0" data-id="0" style="top: 80px; left: 120px;"></div>
                <div class="character char-yellow" id="char1" data-id="1" style="top: 80px; left: 780px;"></div>
                <div class="character char-pink" id="char2" data-id="2" style="top: 420px; left: 120px;"></div>
                <div class="character char-red" id="char3" data-id="3" style="top: 420px; left: 780px;"></div>
            </div>

            <!-- Нижний ряд аватаров -->
            <div class="avatars-row-bottom">
                <div class="avatar-frame avatar-pink">
                    <div class="avatar-square" id="avatar2"></div>
                    <div class="status-bar-container">
                        <div class="status-fill" id="bar2" style="width: 0%; background: #d96c9e;"></div>
                    </div>
                </div>
                <div class="avatar-frame avatar-red">
                    <div class="avatar-square" id="avatar3"></div>
                    <div class="status-bar-container">
                        <div class="status-fill" id="bar3" style="width: 0%; background: #c44b4b;"></div>
                    </div>
                </div>
            </div>

            <div class="connection-status" id="connectionStatus">🟡 Подключение...</div>
            <div class="instruction">⬤ КАЖДЫЙ ПЕРСОНАЖ ИДЕТ К СВОЕЙ ТОЧКЕ В ЦЕНТРАЛЬНОМ КВАДРАТЕ ⬤</div>
        </div>
    </div>

    <script>
        (function() {
            const USE_LOCAL_STORAGE_SYNC = true;
            
            // === ЭЛЕМЕНТЫ ===
            const characters = document.querySelectorAll('.character');
            const bars = [document.getElementById('bar0'), document.getElementById('bar1'), document.getElementById('bar2'), document.getElementById('bar3')];
            const gameScreen = document.getElementById('gameScreen');
            const connectionSpan = document.getElementById('connectionStatus');
            
            // === ЦЕНТРАЛЬНЫЙ КВАДРАТ 2x2 ===
            // Квадрат размером 100x100 пикселей (можно изменить)
            const squareSize = 100; // сторона квадрата
            
            // Индивидуальные финишные точки для каждого персонажа (внутри квадрата)
            // Они расположены по углам внутреннего квадрата размером 40x40, чтобы не накладываться
            const finishPoints = [
                { x: -20, y: -20 }, // синий - левый верхний угол внутри квадрата
                { x: 20, y: -20 },  // желтый - правый верхний
                { x: -20, y: 20 },  // розовый - левый нижний
                { x: 20, y: 20 }    // алый - правый нижний
            ];
            
            // Центр экрана (середина квадрата)
            const centerX = 450;
            const centerY = 250;
            
            // Реальные координаты финишных точек (смещение от центра)
            let targetPositions = [];
            
            // Максимальное расстояние (от стартовой позиции до своей цели)
            let maxDistances = [];
            
            // Стартовые позиции
            const startPositions = [
                { x: 120, y: 80 },
                { x: 780, y: 80 },
                { x: 120, y: 420 },
                { x: 780, y: 420 }
            ];
            
            // Флаг обновления
            let updatingFromSync = false;

            // === ИНИЦИАЛИЗАЦИЯ ФИНИШНЫХ ТОЧЕК ===
            function initTargetPositions() {
                for (let i = 0; i < 4; i++) {
                    targetPositions[i] = {
                        x: centerX + finishPoints[i].x,
                        y: centerY + finishPoints[i].y
                    };
                    
                    // Вычисляем максимальное расстояние (от старта до цели)
                    const dx = startPositions[i].x - targetPositions[i].x;
                    const dy = startPositions[i].y - targetPositions[i].y;
                    maxDistances[i] = Math.sqrt(dx*dx + dy*dy);
                }
            }
            initTargetPositions();

            // === ФУНКЦИЯ ВЫЧИСЛЕНИЯ ПРОГРЕССА (индивидуальная для каждого) ===
            function computeProgress(charIndex) {
                const char = characters[charIndex];
                const left = parseFloat(char.style.left) || startPositions[charIndex].x;
                const top = parseFloat(char.style.top) || startPositions[charIndex].y;
                
                const targetX = targetPositions[charIndex].x;
                const targetY = targetPositions[charIndex].y;
                
                const dx = left - targetX;
                const dy = top - targetY;
                const distance = Math.sqrt(dx*dx + dy*dy);
                
                // Прогресс: 1 когда distance = 0, 0 когда distance >= maxDistance
                let progress = 1 - (distance / maxDistances[charIndex]);
                
                // Если персонаж дальше стартовой позиции, прогресс может быть отрицательным - обнуляем
                progress = Math.max(0, Math.min(1, progress));
                
                return progress;
            }

            // === ОБНОВЛЕНИЕ ВСЕХ БАРОВ ===
            function updateAllBars() {
                for (let i = 0; i < characters.length; i++) {
                    const progress = computeProgress(i);
                    bars[i].style.width = Math.round(progress * 100) + '%';
                }
            }

            // === СОХРАНЕНИЕ В LOCALSTORAGE ===
            function saveToLocalStorage() {
                if (!USE_LOCAL_STORAGE_SYNC) return;
                
                const positions = [];
                for (let i = 0; i < characters.length; i++) {
                    positions.push({
                        x: parseFloat(characters[i].style.left) || startPositions[i].x,
                        y: parseFloat(characters[i].style.top) || startPositions[i].y
                    });
                }
                localStorage.setItem('gamePositions', JSON.stringify(positions));
                localStorage.setItem('gameUpdateTime', Date.now().toString());
            }

            // === ЗАГРУЗКА ИЗ LOCALSTORAGE ===
            function loadFromLocalStorage() {
                if (!USE_LOCAL_STORAGE_SYNC) return false;
                
                const saved = localStorage.getItem('gamePositions');
                if (saved) {
                    try {
                        const positions = JSON.parse(saved);
                        updatingFromSync = true;
                        
                        for (let i = 0; i < Math.min(positions.length, characters.length); i++) {
                            if (positions[i] && typeof positions[i].x === 'number') {
                                // Проверка границ
                                const screenRect = gameScreen.getBoundingClientRect();
                                const maxX = screenRect.width - characters[i].offsetWidth/2;
                                const maxY = screenRect.height - characters[i].offsetHeight/2;
                                const minX = characters[i].offsetWidth/2;
                                const minY = characters[i].offsetHeight/2;
                                
                                let newX = Math.max(minX, Math.min(maxX, positions[i].x));
                                let newY = Math.max(minY, Math.min(maxY, positions[i].y));
                                
                                characters[i].style.left = newX + 'px';
                                characters[i].style.top = newY + 'px';
                            }
                        }
                        
                        updateAllBars();
                        updatingFromSync = false;
                        return true;
                    } catch (e) {
                        console.warn('Ошибка загрузки из localStorage', e);
                    }
                }
                return false;
            }

            // === НАСТРОЙКА ПЕРЕТАСКИВАНИЯ ===
            characters.forEach((char, index) => {
                let isDragging = false;
                let startX, startY, startLeft, startTop;

                const onMouseMove = (e) => {
                    if (!isDragging) return;
                    e.preventDefault();

                    const dx = e.clientX - startX;
                    const dy = e.clientY - startY;

                    let newLeft = startLeft + dx;
                    let newTop = startTop + dy;

                    // Ограничиваем
                    const screenRect = gameScreen.getBoundingClientRect();
                    const charWidth = char.offsetWidth;
                    const charHeight = char.offsetHeight;

                    newLeft = Math.max(charWidth/2, Math.min(screenRect.width - charWidth/2, newLeft));
                    newTop = Math.max(charHeight/2, Math.min(screenRect.height - charHeight/2, newTop));

                    char.style.left = newLeft + 'px';
                    char.style.top = newTop + 'px';

                    updateAllBars();
                };

                const onMouseUp = (e) => {
                    if (isDragging) {
                        isDragging = false;
                        document.removeEventListener('mousemove', onMouseMove);
                        document.removeEventListener('mouseup', onMouseUp);
                        
                        if (USE_LOCAL_STORAGE_SYNC) {
                            saveToLocalStorage();
                        }
                    }
                };

                char.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    isDragging = true;
                    startX = e.clientX;
                    startY = e.clientY;
                    
                    startLeft = parseFloat(char.style.left) || startPositions[index].x;
                    startTop = parseFloat(char.style.top) || startPositions[index].y;

                    document.addEventListener('mousemove', onMouseMove);
                    document.addEventListener('mouseup', onMouseUp);
                });
            });

            // === СИНХРОНИЗАЦИЯ ===
            if (USE_LOCAL_STORAGE_SYNC) {
                loadFromLocalStorage();
                
                window.addEventListener('storage', (e) => {
                    if (e.key === 'gamePositions' && !updatingFromSync) {
                        loadFromLocalStorage();
                    }
                });
                
                connectionSpan.innerHTML = '🟢 Локальная синхронизация';
                connectionSpan.style.color = '#9bbc0f';
            }

            // Инициализация
            setTimeout(() => {
                updateAllBars();
                if (USE_LOCAL_STORAGE_SYNC) {
                    saveToLocalStorage();
                }
            }, 100);

            // Карта
            const mapEl = document.getElementById('mapImage');
            mapEl.style.backgroundImage = "url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAAAVUlEQVRYR+3UsQ0AIAgE0GMM7qBbuIBruIGFjYmx0PgLr4Fc8vJCLgJmZmb/txGZ2UZkZhvxPzOzEZnZRmRmG5GZbURmthGZ2UZkZhuRmW1EZrYRmdlGZGYb8QHPrB0YAgmxaQAAAABJRU5ErkJggg==')";
            mapEl.style.backgroundRepeat = 'repeat';
            mapEl.style.backgroundSize = '32px 32px';
        })();
    </script>
</body>
</html>

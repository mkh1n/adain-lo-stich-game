<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>GameBoy — исправленный прогресс (финал)</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="gameboy-frame">
        <div class="game-container">

            <div class="avatars-row">
                <div class="avatar-frame avatar-blue">
                    <div class="avatar-square"></div>
                    <div class="status-bar-container">
                        <div class="status-fill" id="bar0" style="background:#4a7db5;"></div>
                    </div>
                </div>
                <div class="avatar-frame avatar-yellow">
                    <div class="avatar-square"></div>
                    <div class="status-bar-container">
                        <div class="status-fill" id="bar1" style="background:#e3c14e;"></div>
                    </div>
                </div>
            </div>

            <div class="game-screen" id="gameScreen">
                <div class="map-background"></div>
                <div class="center-square"></div>

                <div class="character char-blue" id="char0" style="top:40px; left:40px;"></div>
                <div class="character char-yellow" id="char1" style="top:40px; left:1160px;"></div>
                <div class="character char-pink" id="char2" style="top:660px; left:40px;"></div>
                <div class="character char-red" id="char3" style="top:660px; left:1160px;"></div>
            </div>

            <div class="avatars-row-bottom">
                <div class="avatar-frame avatar-pink">
                    <div class="avatar-square"></div>
                    <div class="status-bar-container">
                        <div class="status-fill" id="bar2" style="background:#d96c9e;"></div>
                    </div>
                </div>
                <div class="avatar-frame avatar-red">
                    <div class="avatar-square"></div>
                    <div class="status-bar-container">
                        <div class="status-fill" id="bar3" style="background:#c44b4b;"></div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script type="module">
        // Импорт Supabase клиентской библиотеки
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        // ВАЖНО: Замените эти значения на ваши собственные из проекта Supabase
        // 1. Создайте бесплатный проект на https://supabase.com
        // 2. В Settings -> API найдите Project URL и anon/public key
        const SUPABASE_URL = 'https://tnmrtubphcybtdldgefc.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRubXJ0dWJwaGN5YnRkbGRnZWZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MDUzMjUsImV4cCI6MjA5MDQ4MTMyNX0.ZbT1An-6Jpwsaxlk8Btr3tK2N-tMS4PgO6nCpN2Cny8';

        // Инициализация клиента Supabase
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Таблица для хранения позиций (создайте её в Supabase)
        const TABLE_NAME = 'game_positions';

        // Структура таблицы в Supabase (выполните этот SQL в редакторе SQL в Supabase):
        /*
        CREATE TABLE game_positions (
          id INTEGER PRIMARY KEY CHECK (id >= 0 AND id <= 3),
          x NUMERIC NOT NULL DEFAULT 40,
          y NUMERIC NOT NULL DEFAULT 40,
          updated_at TIMESTAMPTZ DEFAULT NOW()
        );

        INSERT INTO game_positions (id, x, y) VALUES
          (0, 40, 40),
          (1, 1160, 40),
          (2, 40, 660),
          (3, 1160, 660)
        ON CONFLICT (id) DO NOTHING;

        -- Включить Realtime для таблицы
        ALTER PUBLICATION supabase_realtime ADD TABLE game_positions;
        */

        (function () {
            const characters = document.querySelectorAll('.character');
            const bars = [document.getElementById('bar0'), document.getElementById('bar1'), document.getElementById('bar2'), document.getElementById('bar3')];
            const gameScreen = document.getElementById('gameScreen');

            // Центральный квадрат (размер 120x120)
            const squareSize = 120;
            const centerX = 600;
            const centerY = 350;
            const squareLeft = centerX - squareSize / 2;
            const squareRight = centerX + squareSize / 2;
            const squareTop = centerY - squareSize / 2;
            const squareBottom = centerY + squareSize / 2;

            // Угловые позиции (стартовые)
            const cornerPositions = [
                { x: 40, y: 40 },
                { x: 1160, y: 40 },
                { x: 40, y: 660 },
                { x: 1160, y: 660 }
            ];

            // Функция расстояния от точки до прямоугольника (квадрата)
            function distanceToSquare(px, py) {
                let dx = 0;
                if (px < squareLeft) dx = squareLeft - px;
                else if (px > squareRight) dx = px - squareRight;
                let dy = 0;
                if (py < squareTop) dy = squareTop - py;
                else if (py > squareBottom) dy = py - squareBottom;
                return Math.sqrt(dx * dx + dy * dy);
            }

            // Вычисляем максимальное расстояние от каждого угла до квадрата
            let maxDistances = [];
            for (let i = 0; i < 4; i++) {
                const d = distanceToSquare(cornerPositions[i].x, cornerPositions[i].y);
                maxDistances[i] = d > 0 ? d : 0.001; // защита от нуля
            }

            // Функция прогресса для персонажа
            function computeProgress(charIndex) {
                const char = characters[charIndex];
                const currentX = parseFloat(char.style.left) || cornerPositions[charIndex].x;
                const currentY = parseFloat(char.style.top) || cornerPositions[charIndex].y;

                const distToSquare = distanceToSquare(currentX, currentY);
                if (distToSquare === 0) return 1.0; // уже внутри квадрата

                const maxDist = maxDistances[charIndex];
                let progress = 1 - (distToSquare / maxDist);
                return Math.max(0, Math.min(1, progress));
            }

            function updateAllBars() {
                for (let i = 0; i < characters.length; i++) {
                    const progress = computeProgress(i);
                    bars[i].style.width = Math.round(progress * 100) + '%';
                }
            }

            // Флаг для предотвращения циклических обновлений
            let isUpdatingFromRemote = false;

            // Обновление позиции персонажа на экране
            function updateCharacterPosition(index, x, y) {
                isUpdatingFromRemote = true;
                characters[index].style.left = x + 'px';
                characters[index].style.top = y + 'px';
                updateAllBars();
                setTimeout(() => { isUpdatingFromRemote = false; }, 100);
            }

            // Загрузка начальных позиций из Supabase
            async function loadPositions() {
                try {
                    const { data, error } = await supabase
                        .from(TABLE_NAME)
                        .select('*')
                        .order('id');

                    if (error) {
                        console.error('Ошибка загрузки позиций:', error);
                        console.log('Убедитесь, что вы создали таблицу game_positions в Supabase и вставили правильные ключи');
                        return;
                    }

                    if (data && data.length > 0) {
                        data.forEach(row => {
                            if (row.id >= 0 && row.id < characters.length) {
                                updateCharacterPosition(row.id, row.x, row.y);
                            }
                        });
                    }
                } catch (err) {
                    console.error('Ошибка при загрузке:', err);
                }
            }

            // Обновление позиции в Supabase
            async function updatePositionInDB(index, x, y) {
                try {
                    const { error } = await supabase
                        .from(TABLE_NAME)
                        .update({ x: x, y: y, updated_at: new Date().toISOString() })
                        .eq('id', index);

                    if (error) {
                        console.error('Ошибка обновления позиции:', error);
                    }
                } catch (err) {
                    console.error('Ошибка при обновлении:', err);
                }
            }

            // Подписка на изменения в реальном времени через Supabase Realtime
            function subscribeToChanges() {
                const channel = supabase
                    .channel('game_positions_changes')
                    .on(
                        'postgres_changes',
                        {
                            event: 'UPDATE',
                            schema: 'public',
                            table: TABLE_NAME
                        },
                        (payload) => {
                            const { new: newRow } = payload;
                            const index = newRow.id;

                            // Не обновляем, если это наше локальное изменение
                            if (!isUpdatingFromRemote && index >= 0 && index < characters.length) {
                                const currentX = parseFloat(characters[index].style.left);
                                const currentY = parseFloat(characters[index].style.top);

                                // Обновляем только если позиция действительно изменилась
                                if (Math.abs(newRow.x - currentX) > 0.1 || Math.abs(newRow.y - currentY) > 0.1) {
                                    updateCharacterPosition(index, newRow.x, newRow.y);
                                }
                            }
                        }
                    )
                    .subscribe();

                console.log('Подписка на изменения создана');
            }

            // Перетаскивание
            characters.forEach((char, index) => {
                let isDragging = false;
                let startX, startY, startLeft, startTop;
                let lastSavedX, lastSavedY;
                let saveTimeout = null;

                const onMouseMove = (e) => {
                    if (!isDragging) return;
                    const dx = e.clientX - startX;
                    const dy = e.clientY - startY;
                    let newLeft = startLeft + dx;
                    let newTop = startTop + dy;

                    const screenRect = gameScreen.getBoundingClientRect();
                    newLeft = Math.max(28, Math.min(screenRect.width - 28, newLeft));
                    newTop = Math.max(28, Math.min(screenRect.height - 28, newTop));

                    char.style.left = newLeft + 'px';
                    char.style.top = newTop + 'px';
                    updateAllBars();
                };

                const onMouseUp = () => {
                    if (isDragging) {
                        isDragging = false;
                        document.removeEventListener('mousemove', onMouseMove);
                        document.removeEventListener('mouseup', onMouseUp);

                        // Сохраняем позицию в Supabase
                        const finalX = parseFloat(char.style.left);
                        const finalY = parseFloat(char.style.top);
                        updatePositionInDB(index, finalX, finalY);
                    }
                };

                char.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    isDragging = true;
                    startX = e.clientX;
                    startY = e.clientY;
                    startLeft = parseFloat(char.style.left) || cornerPositions[index].x;
                    startTop = parseFloat(char.style.top) || cornerPositions[index].y;

                    document.addEventListener('mousemove', onMouseMove);
                    document.addEventListener('mouseup', onMouseUp);
                });
            });

            // Для мобильных устройств - поддержка touch событий
            characters.forEach((char, index) => {
                let isTouchDragging = false;
                let startTouchX, startTouchY, startLeft, startTop;

                const onTouchMove = (e) => {
                    if (!isTouchDragging) return;
                    e.preventDefault();
                    const touch = e.touches[0];
                    const dx = touch.clientX - startTouchX;
                    const dy = touch.clientY - startTouchY;
                    let newLeft = startLeft + dx;
                    let newTop = startTop + dy;

                    const screenRect = gameScreen.getBoundingClientRect();
                    newLeft = Math.max(28, Math.min(screenRect.width - 28, newLeft));
                    newTop = Math.max(28, Math.min(screenRect.height - 28, newTop));

                    char.style.left = newLeft + 'px';
                    char.style.top = newTop + 'px';
                    updateAllBars();
                };

                const onTouchEnd = () => {
                    if (isTouchDragging) {
                        isTouchDragging = false;
                        const finalX = parseFloat(char.style.left);
                        const finalY = parseFloat(char.style.top);
                        updatePositionInDB(index, finalX, finalY);
                    }
                };

                char.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    isTouchDragging = true;
                    const touch = e.touches[0];
                    startTouchX = touch.clientX;
                    startTouchY = touch.clientY;
                    startLeft = parseFloat(char.style.left) || cornerPositions[index].x;
                    startTop = parseFloat(char.style.top) || cornerPositions[index].y;
                }, { passive: false });

                char.addEventListener('touchmove', onTouchMove, { passive: false });
                char.addEventListener('touchend', onTouchEnd);
            });

            // Инициализация
            console.log('Инициализация игры...');
            console.log('Supabase URL:', SUPABASE_URL);


            loadPositions();
            subscribeToChanges();

            updateAllBars();
        })();
    </script>

</body>

</html>

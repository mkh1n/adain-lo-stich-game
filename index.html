<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameBoy — точное расстояние до квадрата</title>
    <style>
        /* Все стили без изменений (такие же, как в предыдущем рабочем варианте) */
        * {
            box-sizing: border-box;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            font-family: 'Courier New', Courier, monospace;
        }
        body {
            background: #2d1b0e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
        }
        .gameboy-frame {
            background: #9bbc0f;
            padding: 24px 24px 32px 24px;
            border-radius: 20px 20px 30px 30px;
            box-shadow: inset -4px -4px 0 #6b8c0c, inset 4px 4px 0 #c4e01e, 0 10px 0 #3f2e1b;
            border: 2px solid #0f380f;
        }
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .avatars-row, .avatars-row-bottom {
            display: flex;
            justify-content: space-between;
            width: 1200px;
        }
        .avatars-row { margin-bottom: 12px; }
        .avatars-row-bottom { margin-top: 12px; }
        .avatar-frame {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #3a5f3a;
            border: 4px solid #1e3a1e;
            box-shadow: inset -2px -2px 0 #0f280f, inset 2px 2px 0 #6b8c6b;
            padding: 8px 12px;
            width: 220px;
        }
        .avatar-square {
            width: 56px;
            height: 56px;
            border: 4px solid #1e3a1e;
            background: #6b8c6b;
            box-shadow: inset -2px -2px 0 #2f4a2f, inset 2px 2px 0 #8bb08b;
        }
        .avatar-blue .avatar-square { background: #4a7db5; background-image: repeating-linear-gradient(45deg, #2a4d8a 0px, #2a4d8a 4px, #6a9fd0 4px, #6a9fd0 8px); }
        .avatar-yellow .avatar-square { background: #e3c14e; background-image: repeating-linear-gradient(45deg, #b38b2a 0px, #b38b2a 4px, #f5e17a 4px, #f5e17a 8px); }
        .avatar-pink .avatar-square { background: #d96c9e; background-image: repeating-linear-gradient(45deg, #a13e6f 0px, #a13e6f 4px, #f7a8c4 4px, #f7a8c4 8px); }
        .avatar-red .avatar-square { background: #c44b4b; background-image: repeating-linear-gradient(45deg, #8b2a2a 0px, #8b2a2a 4px, #e68080 4px, #e68080 8px); }
        .status-bar-container {
            flex: 1;
            height: 24px;
            background: #1e3a1e;
            border: 3px solid #0f280f;
            box-shadow: inset 1px 1px 0 #0b1b0b;
        }
        .status-fill {
            height: 100%;
            width: 0%;
            transition: width 0.1s;
            box-shadow: inset -1px -1px 0 #2d6b2d, inset 1px 1px 0 #8fd08f;
        }
        .game-screen {
            position: relative;
            width: 1200px;
            height: 700px;
            background: #9a9e76;
            border: 6px solid #0f380f;
            border-radius: 12px;
            box-shadow: inset 0 0 0 2px #6b8c0c;
            overflow: hidden;
            margin: 0 auto;
        }
        .map-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #7c9f4f 2px, transparent 2px), linear-gradient(-45deg, #6d8f42 2px, transparent 2px);
            background-size: 16px 16px;
            background-color: #8bb15a;
            z-index: 1;
        }
        .center-square {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 120px;
            height: 120px;
            transform: translate(-50%, -50%);
            border: 4px solid #f0e68c;
            background: rgba(240, 230, 140, 0.15);
            box-shadow: 0 0 0 2px #b09050;
            z-index: 10;
            pointer-events: none;
        }
        .character {
            position: absolute;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 4px solid #1a2b1a;
            box-shadow: 0 4px 0 #0f1f0f, inset -2px -2px 0 rgba(0,0,0,0.5);
            transform: translate(-50%, -50%);
            z-index: 100;
            cursor: grab;
        }
        .character:active {
            cursor: grabbing;
            filter: brightness(1.1);
            transform: translate(-50%, -48%);
        }
        .char-blue { background: #4a7db5; }
        .char-yellow { background: #e3c14e; }
        .char-pink { background: #d96c9e; }
        .char-red { background: #c44b4b; }
    </style>
</head>
<body>
    <div class="gameboy-frame">
        <div class="game-container">
            <div class="avatars-row">
                <div class="avatar-frame avatar-blue">
                    <div class="avatar-square"></div>
                    <div class="status-bar-container"><div class="status-fill" id="bar0" style="width: 0%; background: #4a7db5;"></div></div>
                </div>
                <div class="avatar-frame avatar-yellow">
                    <div class="avatar-square"></div>
                    <div class="status-bar-container"><div class="status-fill" id="bar1" style="width: 0%; background: #e3c14e;"></div></div>
                </div>
            </div>
            <div class="game-screen" id="gameScreen">
                <div class="map-background"></div>
                <div class="center-square"></div>
                <!-- Персонажи строго по углам (координаты от верхнего левого угла с учётом радиуса) -->
                <div class="character char-blue" id="char0" data-id="0" style="top: 40px; left: 40px;"></div>
                <div class="character char-yellow" id="char1" data-id="1" style="top: 40px; left: 1160px;"></div>
                <div class="character char-pink" id="char2" data-id="2" style="top: 660px; left: 40px;"></div>
                <div class="character char-red" id="char3" data-id="3" style="top: 660px; left: 1160px;"></div>
            </div>
            <div class="avatars-row-bottom">
                <div class="avatar-frame avatar-pink">
                    <div class="avatar-square"></div>
                    <div class="status-bar-container"><div class="status-fill" id="bar2" style="width: 0%; background: #d96c9e;"></div></div>
                </div>
                <div class="avatar-frame avatar-red">
                    <div class="avatar-square"></div>
                    <div class="status-bar-container"><div class="status-fill" id="bar3" style="width: 0%; background: #c44b4b;"></div></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        // Импорт Supabase клиентской библиотеки
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        // ВАЖНО: Замените эти значения на ваши собственные из проекта Supabase
        // 1. Создайте бесплатный проект на https://supabase.com
        // 2. В Settings -> API найдите Project URL и anon/public key
        const SUPABASE_URL = 'YOUR_SUPABASE_URL';
        const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';

        // Инициализация клиента Supabase
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Таблица для хранения позиций (создайте её в Supabase)
        const TABLE_NAME = 'game_positions';

        // Структура таблицы в Supabase (выполните этот SQL в редакторе SQL в Supabase):
        /*
        CREATE TABLE game_positions (
          id INTEGER PRIMARY KEY CHECK (id >= 0 AND id <= 3),
          x NUMERIC NOT NULL DEFAULT 40,
          y NUMERIC NOT NULL DEFAULT 40,
          updated_at TIMESTAMPTZ DEFAULT NOW()
        );

        INSERT INTO game_positions (id, x, y) VALUES 
          (0, 40, 40),
          (1, 1160, 40),
          (2, 40, 660),
          (3, 1160, 660)
        ON CONFLICT (id) DO NOTHING;

        -- Включить Realtime для таблицы
        ALTER PUBLICATION supabase_realtime ADD TABLE game_positions;
        */

        (function() {
            const characters = document.querySelectorAll('.character');
            const bars = [document.getElementById('bar0'), document.getElementById('bar1'), document.getElementById('bar2'), document.getElementById('bar3')];
            const gameScreen = document.getElementById('gameScreen');
            
            // Центральный квадрат (размер 120x120)
            const squareSize = 120;
            const centerX = 600;
            const centerY = 350;
            const squareLeft = centerX - squareSize/2;
            const squareRight = centerX + squareSize/2;
            const squareTop = centerY - squareSize/2;
            const squareBottom = centerY + squareSize/2;
            
            // Угловые позиции (стартовые)
            const cornerPositions = [
                { x: 40, y: 40 },
                { x: 1160, y: 40 },
                { x: 40, y: 660 },
                { x: 1160, y: 660 }
            ];
            
            // Функция расстояния от точки до прямоугольника (квадрата)
            function distanceToSquare(px, py) {
                let dx = 0;
                if (px < squareLeft) dx = squareLeft - px;
                else if (px > squareRight) dx = px - squareRight;
                let dy = 0;
                if (py < squareTop) dy = squareTop - py;
                else if (py > squareBottom) dy = py - squareBottom;
                return Math.sqrt(dx*dx + dy*dy);
            }
            
            // Вычисляем максимальное расстояние от каждого угла до квадрата
            let maxDistances = [];
            for (let i = 0; i < 4; i++) {
                const d = distanceToSquare(cornerPositions[i].x, cornerPositions[i].y);
                maxDistances[i] = d > 0 ? d : 0.001; // защита от нуля
            }
            
            // Функция прогресса для персонажа
            function computeProgress(charIndex) {
                const char = characters[charIndex];
                const currentX = parseFloat(char.style.left) || cornerPositions[charIndex].x;
                const currentY = parseFloat(char.style.top) || cornerPositions[charIndex].y;
                
                const distToSquare = distanceToSquare(currentX, currentY);
                if (distToSquare === 0) return 1.0; // уже внутри квадрата
                
                const maxDist = maxDistances[charIndex];
                let progress = 1 - (distToSquare / maxDist);
                return Math.max(0, Math.min(1, progress));
            }
            
            function updateAllBars() {
                for (let i = 0; i < characters.length; i++) {
                    const progress = computeProgress(i);
                    bars[i].style.width = Math.round(progress * 100) + '%';
                }
            }

            // Флаг для предотвращения циклических обновлений
            let isUpdatingFromRemote = false;
            
            // Обновление позиции персонажа на экране
            function updateCharacterPosition(index, x, y) {
                isUpdatingFromRemote = true;
                characters[index].style.left = x + 'px';
                characters[index].style.top = y + 'px';
                updateAllBars();
                setTimeout(() => { isUpdatingFromRemote = false; }, 100);
            }

            // Загрузка начальных позиций из Supabase
            async function loadPositions() {
                try {
                    const { data, error } = await supabase
                        .from(TABLE_NAME)
                        .select('*')
                        .order('id');
                    
                    if (error) {
                        console.error('Ошибка загрузки позиций:', error);
                        console.log('Убедитесь, что вы создали таблицу game_positions в Supabase и вставили правильные ключи');
                        return;
                    }

                    if (data && data.length > 0) {
                        data.forEach(row => {
                            if (row.id >= 0 && row.id < characters.length) {
                                updateCharacterPosition(row.id, row.x, row.y);
                            }
                        });
                    }
                } catch (err) {
                    console.error('Ошибка при загрузке:', err);
                }
            }

            // Обновление позиции в Supabase
            async function updatePositionInDB(index, x, y) {
                try {
                    const { error } = await supabase
                        .from(TABLE_NAME)
                        .update({ x: x, y: y, updated_at: new Date().toISOString() })
                        .eq('id', index);
                    
                    if (error) {
                        console.error('Ошибка обновления позиции:', error);
                    }
                } catch (err) {
                    console.error('Ошибка при обновлении:', err);
                }
            }

            // Подписка на изменения в реальном времени через Supabase Realtime
            function subscribeToChanges() {
                const channel = supabase
                    .channel('game_positions_changes')
                    .on(
                        'postgres_changes',
                        {
                            event: 'UPDATE',
                            schema: 'public',
                            table: TABLE_NAME
                        },
                        (payload) => {
                            const { new: newRow } = payload;
                            const index = newRow.id;
                            
                            // Не обновляем, если это наше локальное изменение
                            if (!isUpdatingFromRemote && index >= 0 && index < characters.length) {
                                const currentX = parseFloat(characters[index].style.left);
                                const currentY = parseFloat(characters[index].style.top);
                                
                                // Обновляем только если позиция действительно изменилась
                                if (Math.abs(newRow.x - currentX) > 0.1 || Math.abs(newRow.y - currentY) > 0.1) {
                                    updateCharacterPosition(index, newRow.x, newRow.y);
                                }
                            }
                        }
                    )
                    .subscribe();
                
                console.log('Подписка на изменения создана');
            }

            // Перетаскивание
            characters.forEach((char, index) => {
                let isDragging = false;
                let startX, startY, startLeft, startTop;
                let lastSavedX, lastSavedY;
                let saveTimeout = null;
                
                const onMouseMove = (e) => {
                    if (!isDragging) return;
                    const dx = e.clientX - startX;
                    const dy = e.clientY - startY;
                    let newLeft = startLeft + dx;
                    let newTop = startTop + dy;
                    
                    const screenRect = gameScreen.getBoundingClientRect();
                    newLeft = Math.max(28, Math.min(screenRect.width - 28, newLeft));
                    newTop = Math.max(28, Math.min(screenRect.height - 28, newTop));
                    
                    char.style.left = newLeft + 'px';
                    char.style.top = newTop + 'px';
                    updateAllBars();
                };
                
                const onMouseUp = () => {
                    if (isDragging) {
                        isDragging = false;
                        document.removeEventListener('mousemove', onMouseMove);
                        document.removeEventListener('mouseup', onMouseUp);
                        
                        // Сохраняем позицию в Supabase
                        const finalX = parseFloat(char.style.left);
                        const finalY = parseFloat(char.style.top);
                        updatePositionInDB(index, finalX, finalY);
                    }
                };
                
                char.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    isDragging = true;
                    startX = e.clientX;
                    startY = e.clientY;
                    startLeft = parseFloat(char.style.left) || cornerPositions[index].x;
                    startTop = parseFloat(char.style.top) || cornerPositions[index].y;
                    
                    document.addEventListener('mousemove', onMouseMove);
                    document.addEventListener('mouseup', onMouseUp);
                });
            });

            // Для мобильных устройств - поддержка touch событий
            characters.forEach((char, index) => {
                let isTouchDragging = false;
                let startTouchX, startTouchY, startLeft, startTop;
                
                const onTouchMove = (e) => {
                    if (!isTouchDragging) return;
                    e.preventDefault();
                    const touch = e.touches[0];
                    const dx = touch.clientX - startTouchX;
                    const dy = touch.clientY - startTouchY;
                    let newLeft = startLeft + dx;
                    let newTop = startTop + dy;
                    
                    const screenRect = gameScreen.getBoundingClientRect();
                    newLeft = Math.max(28, Math.min(screenRect.width - 28, newLeft));
                    newTop = Math.max(28, Math.min(screenRect.height - 28, newTop));
                    
                    char.style.left = newLeft + 'px';
                    char.style.top = newTop + 'px';
                    updateAllBars();
                };
                
                const onTouchEnd = () => {
                    if (isTouchDragging) {
                        isTouchDragging = false;
                        const finalX = parseFloat(char.style.left);
                        const finalY = parseFloat(char.style.top);
                        updatePositionInDB(index, finalX, finalY);
                    }
                };
                
                char.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    isTouchDragging = true;
                    const touch = e.touches[0];
                    startTouchX = touch.clientX;
                    startTouchY = touch.clientY;
                    startLeft = parseFloat(char.style.left) || cornerPositions[index].x;
                    startTop = parseFloat(char.style.top) || cornerPositions[index].y;
                }, { passive: false });
                
                char.addEventListener('touchmove', onTouchMove, { passive: false });
                char.addEventListener('touchend', onTouchEnd);
            });
            
            // Инициализация
            console.log('Инициализация игры...');
            console.log('Supabase URL:', SUPABASE_URL);
            
            if (SUPABASE_URL === 'YOUR_SUPABASE_URL' || SUPABASE_ANON_KEY === 'YOUR_SUPABASE_ANON_KEY') {
                alert('⚠️ Внимание! Вам нужно настроить Supabase:\n\n1. Создайте бесплатный проект на https://supabase.com\n2. Вставьте Project URL и anon key в код (строки 10-11)\n3. Выполните SQL-запрос для создания таблицы (см. комментарий в коде)\n\nБез этого синхронизация между пользователями не будет работать.');
            } else {
                loadPositions();
                subscribeToChanges();
            }
            
            updateAllBars();
        })();
    </script>
</body>
</html>
